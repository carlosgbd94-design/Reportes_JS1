<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Restablecer contraseña | Gestión de Vacunas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">

  <style>
    :root {
      /* MD3 Paleta Institucional (Oxford Blue / Graphite / Emerald) */
      --md-sys-color-primary: #001B3D;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #d6e2ff;
      --md-sys-color-on-primary-container: #001b3e;

      --md-sys-color-secondary: #565e71;
      --md-sys-color-on-secondary: #ffffff;

      --md-sys-color-surface: #fdfbff;
      --md-sys-color-on-surface: #1a1b1f;
      --md-sys-color-surface-container: #f2f3f7;
      --md-sys-color-surface-container-highest: #e2e2e6;

      --md-sys-color-outline: #74777f;
      --md-sys-color-outline-variant: #c4c6cf;

      --md-sys-color-success: #006d3a;
      --md-sys-color-error: #ba1a1a;

      --bg: #f8f9fc;
      --accent-gradient: linear-gradient(135deg, #001B3D 0%, #003366 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(0, 27, 61, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(56, 198, 142, 0.05) 0px, transparent 50%);
      color: var(--md-sys-color-on-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(440px, 100%);
      background: #ffffff;
      border-radius: 28px;
      /* MD3 Premium Radius */
      padding: 32px;
      box-shadow: 0 12px 48px rgba(0, 27, 61, 0.08);
      border: 1px solid var(--md-sys-color-outline-variant);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
      font-weight: 900;
      color: var(--md-sys-color-primary);
      letter-spacing: -0.02em;
    }

    .hint {
      color: var(--md-sys-color-secondary);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: var(--md-sys-color-primary);
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-group {
      position: relative;
    }

    input {
      width: 100%;
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      color: var(--md-sys-color-on-surface);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      outline: none;
    }

    input:focus {
      border-color: var(--md-sys-color-primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(0, 27, 61, 0.05);
    }

    .pwdToggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--md-sys-color-primary);
      transition: background 0.2s;
    }

    .pwdToggle:hover {
      background: rgba(0, 27, 61, 0.05);
    }

    .btn {
      width: 100%;
      margin-top: 32px;
      background: var(--accent-gradient);
      color: #ffffff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 27, 61, 0.2);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    .btn:hover:not(:disabled) {
      transform: translateX(4px);
      box-shadow: 0 8px 24px rgba(0, 27, 61, 0.3);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 20px;
      font-size: 14px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      text-align: center;
      font-weight: 600;
    }

    .msg.show {
      display: block;
    }

    .msg.ok {
      background: #e6f4ea;
      color: #1e7e34;
    }

    .msg.bad {
      background: #fce8e6;
      color: #c5221f;
    }

    .footer-text {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--md-sys-color-secondary);
    }

    /* Success State Overhaul */
    #successBox {
      display: none;
      text-align: center;
      margin-top: 24px;
      padding: 24px;
      background: #f8fff9;
      border-radius: 20px;
      border: 1px solid #d4f7da;
    }

    #successIcon {
      width: 64px;
      height: 64px;
      background: #e6f4ea;
      color: #1e7e34;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      transform: scale(0.5);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 27, 61, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.show {
      display: flex;
    }

    .loader {
      background: #ffffff;
      padding: 32px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--md-sys-color-surface-container);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card" id="mainCard">
    <div class="eyebrow">
      <span class="material-symbols-rounded" style="font-size:18px;">lock_reset</span>
      Seguridad
    </div>
    <h1>Nueva contraseña</h1>
    <p class="hint">Crea una contraseña segura que no hayas usado antes en este sistema.</p>

    <label>Contraseña nueva</label>
    <div class="field-group">
      <input id="resetPwdNew" type="password" placeholder="Mínimo 8 caracteres">
      <button type="button" class="pwdToggle" data-target="resetPwdNew">
        <span class="material-symbols-rounded">visibility</span>
      </button>
    </div>

    <label>Confirmar contraseña</label>
    <div class="field-group">
      <input id="resetPwdConfirm" type="password" placeholder="Repite tu contraseña">
      <button type="button" class="pwdToggle" data-target="resetPwdConfirm">
        <span class="material-symbols-rounded">visibility</span>
      </button>
    </div>

    <button id="btnResetPassword" class="btn">Guardar y Continuar</button>

    <div id="successBox">
      <div id="successIcon" class="material-symbols-rounded">check_circle_outline</div>
      <h2 style="margin:0; font-size:20px; font-weight:900; color:#1e7e34;">¡Listo!</h2>
      <p style="margin:8px 0 0; font-size:14px; color:#565e71;">Tu contraseña ha sido actualizada satisfactoriamente.
      </p>
    </div>

    <div id="msg" class="msg"></div>
    <p class="footer-text">Serás redirigido automáticamente tras completar el proceso.</p>
  </div>

  <div class="overlay" id="overlay">
    <div class="loader">
      <div class="spinner"></div>
      <p style="margin:0; font-weight:800; color:var(--md-sys-color-primary);">Procesando cambio...</p>
    </div>
  </div>

  <script>
    const RESET_TOKEN = "<?= RESET_TOKEN ?>";
    const $ = (id) => document.getElementById(id);

    function showMsg(text, ok) {
      const el = $("msg");
      el.textContent = text;
      el.className = `msg show ${ok ? 'ok' : 'bad'}`;
    }

    function setupPasswordToggles() {
      document.querySelectorAll(".pwdToggle").forEach(btn => {
        btn.onclick = () => {
          const input = $(btn.getAttribute("data-target"));
          const icon = btn.querySelector(".material-symbols-rounded");
          const isPass = input.type === "password";
          input.type = isPass ? "text" : "password";
          icon.textContent = isPass ? "visibility_off" : "visibility";
        };
      });
    }

    async function handleReset() {
      const p1 = $("resetPwdNew").value.trim();
      const p2 = $("resetPwdConfirm").value.trim();

      if (!p1 || !p2) return showMsg("Completa ambos campos.", false);
      if (p1 !== p2) return showMsg("Las contraseñas no coinciden.", false);
      if (p1.length < 6) return showMsg("La contraseña es muy corta.", false);

      $("overlay").classList.add("show");

      try {
        const r = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .api({
              action: "resetPasswordWithToken",
              token: RESET_TOKEN,
              newPassword: p1,
              confirmPassword: p2
            });
        });

        if (r && r.ok) {
          $("btnResetPassword").style.display = "none";
          $("successBox").style.display = "block";
          setTimeout(() => {
            $("successIcon").style.opacity = "1";
            $("successIcon").style.transform = "scale(1)";
          }, 50);

          setTimeout(() => {
            window.location.href = "<?= ScriptApp.getService().getUrl() ?>";
          }, 3000);
        } else {
          showMsg(r.error || "Error desconocido.", false);
        }
      } catch (e) {
        showMsg("Error de conexión.", false);
      } finally {
        $("overlay").classList.remove("show");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupPasswordToggles();
      $("btnResetPassword").onclick = handleReset;
    });
  </script>
</body>

</html>
