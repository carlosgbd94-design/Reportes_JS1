<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Restablecer contraseña | JS1 Reportes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #003366;
      --primary-container: #d6e3ff;
      --on-primary: #ffffff;
      --surface: #fdfcff;
      --on-surface: #1a1c20;
      --outline: #73777f;
      --outline-variant: #c3c7cf;
      --error: #ba1a1a;
      --success: #006b54;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f1f4f9;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(0, 51, 102, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 51, 102, 0.05) 0%, transparent 50%);
      color: var(--on-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 12px 48px rgba(0, 51, 102, 0.12);
      border: 1px solid var(--outline-variant);
      transition: all 0.3s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-box {
      width: 64px;
      height: 64px;
      background: var(--primary-container);
      color: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    p.subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: #535f70;
      line-height: 1.5;
      font-weight: 500;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--outline);
      font-size: 20px;
    }

    input {
      width: 100%;
      background: #f8fafc;
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 14px 14px 14px 44px;
      font-size: 15px;
      font-weight: 700;
      color: var(--on-surface);
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.08);
    }

    .btn-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      color: var(--outline);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-toggle:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--primary);
    }

    .btn {
      width: 100%;
      height: 54px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(0, 51, 102, 0.2);
      transition: all 0.3s ease;
      margin-top: 12px;
    }

    .btn:hover:not(:disabled) {
      background: #002244;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 51, 102, 0.3);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #323232;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #successState {
      display: none;
      text-align: center;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: #e6f4ea;
      color: #006b54;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 51, 102, 0.85);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      text-align: center;
    }

    .overlay.show { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <div class="card" id="recoveryCard">
    <div id="formState">
      <div class="header">
        <div class="logo-box">
          <span class="material-symbols-rounded" style="font-size: 32px;">lock_reset</span>
        </div>
        <h1>Nueva contraseña</h1>
        <p class="subtitle">Ingresa tu nueva clave de acceso para recuperar tu cuenta.</p>
      </div>

      <div class="field">
        <label>Nueva contraseña</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">lock</span>
          <input type="password" id="pass1" placeholder="8 caracteres mínimos">
          <button type="button" class="btn-toggle" onclick="togglePass('pass1', this)">
            <span class="material-symbols-rounded">visibility</span>
          </button>
        </div>
      </div>

      <div class="field">
        <label>Confirmar contraseña</label>
        <div class="input-wrapper">
          <span class="material-symbols-rounded">verified_user</span>
          <input type="password" id="pass2" placeholder="Repite la contraseña">
          <button type="button" class="btn-toggle" onclick="togglePass('pass2', this)">
            <span class="material-symbols-rounded">visibility</span>
          </button>
        </div>
      </div>

      <button class="btn" id="btnUpdate">
        Actualizar contraseña
        <span class="material-symbols-rounded">arrow_forward</span>
      </button>
    </div>

    <div id="successState">
      <div class="success-icon">
        <span class="material-symbols-rounded" style="font-size: 48px;">check_circle</span>
      </div>
      <h1>¡Actualizado!</h1>
      <p class="subtitle">Tu contraseña ha sido cambiada con éxito. Serás redirigido al inicio en unos segundos.</p>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div style="font-weight: 800; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;">Procesando...</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // SUPABASE CONFIG (Matching main.js)
    const SUPABASE_URL = "https://utclfqjietlxzlorxhrs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0Y2xmcWppZXRseHpsb3J4aHJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTYyNTQsImV4cCI6MjA5MTkzMjI1NH0.EgDK7xkSZHZyUlGF5m2C7bZjrfkx1M8cBXzxIFedDa4";
    
    // Evitar error de referencia al inicializar: usar un nombre distinto para el cliente
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = id => document.getElementById(id);

    function togglePass(id, btn) {
      const input = $(id);
      const icon = btn.querySelector('.material-symbols-rounded');
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      icon.textContent = isPass ? 'visibility_off' : 'visibility';
    }

    function showToast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function handleUpdate() {
      const p1 = $('pass1').value.trim();
      const p2 = $('pass2').value.trim();

      if (p1.length < 8) return showToast("La contraseña debe tener al menos 8 caracteres.");
      if (p1 !== p2) return showToast("Las contraseñas no coinciden.");

      $('overlay').classList.add('show');
      $('btnUpdate').disabled = true;

      try {
        // Usar supabaseClient en lugar de la variable que colisionaba
        const { error } = await supabaseClient.auth.updateUser({ password: p1 });

        if (error) {
          showToast("Error: " + error.message);
          return;
        }

        // Éxito
        $('formState').style.display = 'none';
        $('successState').style.display = 'block';

        setTimeout(() => {
          window.location.href = "https://carlosgbd94-design.github.io/Reportes_JS1/";
        }, 3500);

      } catch (err) {
        showToast("Error de conexión");
        console.error(err);
      } finally {
        $('overlay').classList.remove('show');
        $('btnUpdate').disabled = false;
      }
    }

    window.addEventListener('load', () => {
      $('btnUpdate').onclick = handleUpdate;
      
      // Verificar sesión de recuperación
      supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (!session) {
          showToast("No se detectó sesión de recuperación. Inicia el proceso nuevamente.");
        }
      });
    });
  </script>
</body>

</html>
